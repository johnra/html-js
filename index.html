<body>
    <h1>Ejercicio formulario</h1>
    
    <form id="formulario">
        <label>Nombre:</label>
        <input type="text" name="nombre">
        <p id="error-nombre"></p>
        <br>
        <label>Edad:</label>
        <input type="number" name="edad">
        <p id="error-nombre"></p>

        <br>
        <label>Estado Civil:</label>
        <select name="EstadoCivil">
            <option value="-1">---Debe Seleccionar una opcion---</option>
            <option value="0">Casado</option>
            <option value="1">Soltero</option>
            <option value="2">Divorciado</option>
        </select>
        <p id="error-nombre"></p>
        <br>
        <label>Tiene licencia:</label>
        <input  name="licencia" type="radio"><span>Si</span>
        <input  name="licencia" type="radio"><span>No</span>
        <br>
        <label>Esta de acuerdo?</label>
        <input type="checkbox">
        <br>
        <button type="submit">Aceptar</button>
    </form>

    <script src="js/script.js"></script>
</body>
</html>
